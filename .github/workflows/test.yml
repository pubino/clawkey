name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash syntax check
        run: |
          set -e
          for f in clawkey clawkey-init.sh install.sh portkey-backend.sh test.sh load-env.sh \
                   lib/clawkey-runtime.sh lib/launchd/run-proxy.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: shellcheck (errors only)
        run: |
          # ubuntu-latest ships shellcheck pre-installed.
          shellcheck --severity=error \
            clawkey clawkey-init.sh install.sh portkey-backend.sh test.sh load-env.sh \
            lib/clawkey-runtime.sh lib/launchd/run-proxy.sh

      # Plist semantics are covered by tests/test_proxy_subcommand.py
      # (plistlib parses the rendered template), which runs in the test job.

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: install test deps
        run: |
          python -m pip install --upgrade pip
          # Lightweight set — full requirements.txt pulls litellm[proxy] (~100 packages)
          # which the integration tests need but the rest of the suite does not.
          pip install pytest pyyaml requests

      - name: pytest
        run: |
          # Integration tests (test_litellm_proxy.py, test_portkey_connection.py)
          # skip cleanly when AI_SANDBOX_KEY / a running proxy aren't available.
          pytest tests/ -v
