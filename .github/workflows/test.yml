name: Tests

on:
  push:
    branches: ['**']
    # Doc-only changes don't affect runtime behavior; skip CI for them.
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  # Allow manual reruns from the Actions UI / `gh workflow run` — useful for
  # exercising the e2e job without pushing a code change (e.g. after rotating
  # the AI_SANDBOX_KEY secret).
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Cache bash-3.2.57 (the version macOS ships) between runs.
      # Hit: ~5s. Miss (compile from source): ~60s.
      - name: Cache bash 3.2
        id: cache-bash3
        uses: actions/cache@v5
        with:
          path: /opt/bash3
          key: bash-3.2.57-ubuntu-latest

      - name: Build bash 3.2 (matches macOS)
        if: steps.cache-bash3.outputs.cache-hit != 'true'
        run: |
          set -e
          curl -fsSL https://ftp.gnu.org/gnu/bash/bash-3.2.57.tar.gz | tar -xz
          cd bash-3.2.57
          ./configure --prefix=/opt/bash3 --quiet > /dev/null
          # bash 3.2's Makefile is not parallel-safe (race in lib/readline ar
          # invocation). Single-threaded builds in ~60s and never flakes.
          make -s
          sudo make install -s

      - name: Show bash 3.2 version
        run: /opt/bash3/bin/bash --version | head -1

      - name: shellcheck (errors only)
        run: |
          shellcheck --severity=error \
            clawkey clawkey-init.sh install.sh portkey-backend.sh test.sh load-env.sh \
            lib/clawkey-runtime.sh lib/launchd/run-proxy.sh

      - name: Parse-check every shell script under bash 3.2
        run: |
          set -e
          for f in clawkey clawkey-init.sh install.sh portkey-backend.sh test.sh load-env.sh \
                   lib/clawkey-runtime.sh lib/launchd/run-proxy.sh; do
            echo "bash 3.2 -n $f"
            /opt/bash3/bin/bash -n "$f"
          done

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          # Lightweight: pytest, pyyaml, requests. The full requirements.txt
          # pulls litellm[proxy] (~100 transitive packages) which the
          # integration tests need but the rest of the suite doesn't.
          pip install pytest pyyaml requests

      - name: Run pytest under bash 3.2
        env:
          # Prepend bash 3.2 so test subprocesses that invoke `bash` pick it up.
          # Catches the same compatibility quirks as a macOS runner
          # (e.g. empty-array expansion under set -u) without macOS minutes.
          PATH: /opt/bash3/bin:/usr/local/bin:/usr/bin:/bin
        run: |
          which bash
          bash --version | head -1
          pytest tests/ -v

  # ────────────────────────────────────────────────────────────────────
  # Install + config validation on a clean runner:
  #   1. Install Claude Code via npm.
  #   2. Install clawkey from this commit's tarball (exercises install.sh).
  #   3. Write a clawkey config using the AI_SANDBOX_KEY secret.
  #   4. Boot the LiteLLM proxy and confirm authed /health responds.
  #
  # Live inference (the actual Anthropic → LiteLLM → Portkey → model call)
  # is intentionally NOT asserted here: most institutional Portkey deployments
  # (e.g. Princeton's AI Sandbox) IP-allowlist their model endpoints to
  # campus / VPN networks, which excludes GitHub-hosted runners. A
  # workflow_dispatch trigger lets a maintainer run this job from a
  # self-hosted runner inside the allowlist when an inference smoke test
  # is needed.
  #
  # Skips gracefully (exit 0 + GitHub notice) when the secret is not
  # configured — e.g. PRs from forks, repos without the secret set.
  e2e:
    needs: test
    runs-on: ubuntu-latest
    env:
      AI_SANDBOX_KEY: ${{ secrets.AI_SANDBOX_KEY }}
      E2E_MODEL: ${{ vars.E2E_MODEL || 'claude-opus-4-7' }}
    steps:
      - name: Detect AI_SANDBOX_KEY availability
        id: detect
        run: |
          if [ -n "${AI_SANDBOX_KEY:-}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=E2E skipped::AI_SANDBOX_KEY secret not configured (forks/PRs without secret access skip this job by design)."
          fi

      - if: steps.detect.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.detect.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - if: steps.detect.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - if: steps.detect.outputs.run == 'true'
        name: Install Claude Code CLI (npm)
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - if: steps.detect.outputs.run == 'true'
        name: Install clawkey from this commit (eats own dogfood)
        run: |
          set -e
          # Pack the working tree into a tarball laid out the way install.sh
          # expects, then point install.sh at it via CLAWKEY_TARBALL so we
          # exercise install.sh exactly as a real user would, but without
          # depending on a published GitHub Release for this branch.
          git archive --format=tar.gz --prefix=clawkey-src/ HEAD > /tmp/clawkey.tar.gz
          CLAWKEY_TARBALL=/tmp/clawkey.tar.gz bash install.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - if: steps.detect.outputs.run == 'true'
        name: Configure clawkey with the sandbox key
        run: |
          set -e
          mkdir -p "$HOME/.config/clawkey"
          umask 077
          cat > "$HOME/.config/clawkey/.env" <<EOF
          AI_SANDBOX_KEY=$AI_SANDBOX_KEY
          PORTKEY_MODEL=$E2E_MODEL
          LITELLM_MASTER_KEY=sk-clawkey-ci-$(openssl rand -hex 16)
          EOF
          # Drive the interactive `models --add` prompt non-interactively.
          printf '%s\n' "$E2E_MODEL" | clawkey models --add
          clawkey status

      - if: steps.detect.outputs.run == 'true'
        name: Boot proxy and verify authed /health (no upstream model call)
        run: |
          set -e

          # Pull AI_SANDBOX_KEY + LITELLM_MASTER_KEY from the .env that
          # `clawkey config` wrote in the prior step. The master key gates
          # /health so we need it in scope for the curl probes below.
          set -a
          # shellcheck disable=SC1091
          . "$HOME/.config/clawkey/.env"
          set +a

          # Start the proxy directly via the venv install.sh provisioned.
          # Bypassing `clawkey run` here keeps the test focused on install
          # + config wiring; clawkey run would also exec claude --print,
          # which makes a live model call we deliberately don't assert.
          PROXY_LOG="$HOME/.local/state/clawkey/proxy.log"
          mkdir -p "$(dirname "$PROXY_LOG")"
          "$HOME/.local/share/clawkey/.venv/bin/litellm" \
              --config "$HOME/.config/clawkey/litellm_config.yaml" \
              --host 127.0.0.1 --port 4040 \
              > "$PROXY_LOG" 2>&1 &
          PID=$!
          trap 'kill $PID 2>/dev/null || true; wait $PID 2>/dev/null || true' EXIT

          for i in $(seq 1 30); do
            if curl -sf -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
                http://127.0.0.1:4040/health >/dev/null 2>&1; then
              echo "✓ proxy answered authed /health after ${i}s"
              break
            fi
            if ! kill -0 $PID 2>/dev/null; then
              echo "::error title=Install validation failed::Proxy died during startup"
              tail -40 "$PROXY_LOG"
              exit 1
            fi
            sleep 1
          done

          if ! curl -sf -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
              http://127.0.0.1:4040/health >/dev/null; then
            echo "::error title=Install validation failed::Proxy did not become healthy in 30s"
            tail -40 "$PROXY_LOG"
            exit 1
          fi

          echo
          echo "✓ Install + config validation passed:"
          echo "    - Claude Code installed via npm"
          echo "    - clawkey installed via install.sh from this commit"
          echo "    - .env + litellm_config.yaml written under XDG paths"
          echo "    - LiteLLM proxy boots from the venv and serves authed /health"
          echo
          echo "Note: live inference (Anthropic → LiteLLM → Portkey → model)"
          echo "is not asserted here. Institutional Portkey deployments"
          echo "typically IP-gate model endpoints to campus / VPN networks,"
          echo "which excludes GitHub-hosted runners. Run this workflow on a"
          echo "self-hosted runner inside the allowlist if you want a true"
          echo "inference smoke test."
