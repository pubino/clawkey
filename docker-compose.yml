services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    ports:
      - "127.0.0.1:4040:4040"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    environment:
      - AI_SANDBOX_KEY=${AI_SANDBOX_KEY:-}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-clawkey-local}
    command: ["--config", "/app/config.yaml", "--port", "4040"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H \"Authorization: Bearer $LITELLM_MASTER_KEY\" http://localhost:4040/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  test:
    build: .
    depends_on:
      litellm:
        condition: service_healthy
    environment:
      - AI_SANDBOX_KEY=${AI_SANDBOX_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=https://api.portkey.ai/v1
      - PORTKEY_MODEL=${PORTKEY_MODEL:-}
      - LITELLM_BASE_URL=http://litellm:4040
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-clawkey-local}
    command: python -m pytest tests/ -v

  test-config:
    build: .
    command: python -m pytest tests/test_claude_config.py tests/test_ralph_config.py -v
