# LiteLLM Proxy configuration for Clawkey — TEMPLATE.
# This file is the seed for $CLAWKEY_CONFIG_DIR/litellm_config.yaml (default
# ~/.config/clawkey/litellm_config.yaml). On first invocation, clawkey copies
# this file to that location. All subsequent edits via `clawkey models --add`
# operate on the user copy, not this template.
#
# Add your institution's models with: clawkey models --add

model_list: []

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
